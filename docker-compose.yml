# cleversion: "3.8"

services: 
  dvwa:
    image: vulnerables/web-dvwa
    ports:
      - "8080:80"
    environment:
      - MYSQL_PASSWORD=p@ssw0rd
      - MYSQL_USER=dvwa
      - MYSQL_DB=dvwa
      - MYSQL_HOST=db
    depends_on:
        - db 
    restart: always

  db:
    image: mysql:5.7
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
      - MYSQL_DATABASE=dvwa
    restart: always