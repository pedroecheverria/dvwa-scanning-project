name: DevSecOps Master Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  gitleaks:
    name: "Stage 1 - Secrets Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: "Stage 2 - Container Scan"
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t devsecops-dvwa:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-dvwa:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  snyk:
    name: "Stage 2 - Dependency Scan"
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
      - name: Validate Snyk configuration
        id: snyk-config
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::warning::Missing GitHub secret SNYK_TOKEN. Skipping Snyk until it is configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: snyk/actions/docker@master
        if: steps.snyk-config.outputs.configured == 'true'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: vulnerables/web-dvwa
          args: --file=Dockerfile --severity-threshold=high --sarif-file-output=snyk.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: steps.snyk-config.outputs.configured == 'true'
        with:
          sarif_file: snyk.sarif

  checkov:
    name: "Stage 2 - IaC Scan"
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,docker_compose
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif

  sonarcloud:
    name: "Stage 2 - SAST Scan"
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate SonarCloud configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          missing=0

          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Missing GitHub secret SONAR_TOKEN."
            missing=1
          fi

          if [ -z "$SONAR_ORGANIZATION" ]; then
            echo "::error::Missing GitHub repository variable SONAR_ORGANIZATION."
            missing=1
          elif printf '%s' "$SONAR_ORGANIZATION" | grep -q '[[:space:]]'; then
            echo "::error::SONAR_ORGANIZATION must be the SonarCloud organization key, not the display name."
            missing=1
          fi

          if [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "::error::Missing GitHub repository variable SONAR_PROJECT_KEY."
            missing=1
          elif printf '%s' "$SONAR_PROJECT_KEY" | grep -q '[[:space:]]'; then
            echo "::error::SONAR_PROJECT_KEY must be the SonarCloud project key and cannot contain spaces."
            missing=1
          fi

          exit "$missing"

      - uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
