name: SonarCloud - SAST Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: Static code analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarCloud configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          missing=0

          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Missing GitHub secret SONAR_TOKEN."
            missing=1
          fi

          if [ -z "$SONAR_ORGANIZATION" ]; then
            echo "::error::Missing GitHub repository variable SONAR_ORGANIZATION."
            missing=1
          elif printf '%s' "$SONAR_ORGANIZATION" | grep -q '[[:space:]]'; then
            echo "::error::SONAR_ORGANIZATION must be the SonarCloud organization key, not the display name."
            missing=1
          fi

          if [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "::error::Missing GitHub repository variable SONAR_PROJECT_KEY."
            missing=1
          elif printf '%s' "$SONAR_PROJECT_KEY" | grep -q '[[:space:]]'; then
            echo "::error::SONAR_PROJECT_KEY must be the SonarCloud project key and cannot contain spaces."
            missing=1
          fi

          exit "$missing"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
